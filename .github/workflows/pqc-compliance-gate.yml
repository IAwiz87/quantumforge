name: PQC configuration, policy, and evidence checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  AWS_EC2_METADATA_DISABLED: "true"
  OPA_VERSION: "1.18.2"
  CONFTEST_VERSION: "0.68.2"
  CHECKOV_IMAGE: "bridgecrew/checkov@sha256:c64ffb6d6fc8087c896341a2c697770a04a1cf558db04fa7b8129d8ca6bce336"
  CHECK_JSONSCHEMA_VERSION: "0.37.4"
  CHECK_JSONSCHEMA_SHA256: "e4d1647992674d6b1ed2ca46eee6697760d17a5cc0c167ba09c5b503b883d041"

jobs:
  offline-validation:
    name: Credential-free Terraform, policy, and evidence tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: ${{ env.OPA_VERSION }}

      - name: Install verified Conftest release
        run: sudo ./scripts/install-conftest.sh /usr/local/bin

      - name: Verify formatting and configuration
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false -lockfile=readonly
          terraform validate

      - name: Run Terraform native mock tests without AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          AWS_SESSION_TOKEN: ""
          AWS_PROFILE: ""
          AWS_DEFAULT_PROFILE: ""
        run: |
          terraform test
          terraform -chdir=modules/pqc-kms-signing init -backend=false -input=false -lockfile=readonly
          terraform -chdir=modules/pqc-kms-signing test
          terraform -chdir=modules/hybrid-pqc-alb init -backend=false -input=false -lockfile=readonly
          terraform -chdir=modules/hybrid-pqc-alb test

      - name: Unit-test all deterministic policies
        run: opa test -v policies/

      - name: Verify hybrid PQ plan passes the deployment gate
        run: |
          mkdir -p build/evidence
          conftest test examples/sandbox/mock-plan-hybrid-pass.json \
            --policy policies \
            --output json > build/evidence/conftest-report.json

      - name: Verify classical-only plan is denied for the expected reasons
        run: |
          set +e
          conftest test examples/sandbox/mock-plan-classical-fail.json \
            --policy policies \
            --output json > build/classical-denial.json
          rc=$?
          set -e
          test "$rc" -ne 0
          jq -e '[.[].failures[]?] | length >= 2' build/classical-denial.json >/dev/null

      - name: Generate crypto inventory from a synthetic Terraform plan
        env:
          QUANTUMFORGE_ASSESSMENT_SCOPE: synthetic_fixture
        run: |
          cp examples/sandbox/mock-plan-hybrid-pass.json build/evidence/plan.json
          ./scripts/run-census.sh build/evidence/plan.json build/evidence

      - name: Distinguish no assets from collection failure
        run: |
          printf '%s\n' '{"format_version":"1.2","resource_changes":[]}' > build/empty-plan.json
          ./scripts/run-census.sh build/empty-plan.json build/empty-census
          jq -e '.status == "no_assets_found" and .total_assets == 0' \
            build/empty-census/assessment-status.json >/dev/null
          set +e
          ./scripts/run-census.sh build/missing-plan.json build/failed-census
          rc=$?
          set -e
          test "$rc" -ne 0
          jq -e '.status == "collection_failed"' \
            build/failed-census/assessment-status.json >/dev/null
          printf '%s\n' '{"format_version":"1.2","resource_changes":[{}]}' \
            > build/malformed-plan.json
          set +e
          ./scripts/run-census.sh build/malformed-plan.json build/malformed-census
          census_rc=$?
          conftest test build/malformed-plan.json --policy policies --output json \
            > build/malformed-denial.json
          policy_rc=$?
          set -e
          test "$census_rc" -ne 0
          test "$policy_rc" -ne 0
          jq -e '.status == "collection_failed"' \
            build/malformed-census/assessment-status.json >/dev/null
          jq -e '[.[].failures[]? | select(.msg == "input.resource_changes contains a malformed entry")] | length == 1' \
            build/malformed-denial.json >/dev/null

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate the vendor-neutral inventory schema
        run: |
          mkdir -p build/check-jsonschema
          python -m pip download --disable-pip-version-check --no-deps --only-binary=:all: \
            "check-jsonschema==${CHECK_JSONSCHEMA_VERSION}" \
            --dest build/check-jsonschema
          wheel="build/check-jsonschema/check_jsonschema-${CHECK_JSONSCHEMA_VERSION}-py3-none-any.whl"
          test -s "$wheel"
          printf '%s  %s\n' "$CHECK_JSONSCHEMA_SHA256" "$wheel" | sha256sum -c -
          python -m pip install --disable-pip-version-check "$wheel"
          check-jsonschema \
            --schemafile schemas/crypto-inventory.schema.json \
            examples/inventory/mixed-platform-inventory.json \
            examples/inventory/scoring-ready-inventory.json \
            examples/inventory/calendar-anchored-inventory.json \
            build/evidence/iac-inventory.json

      - name: Exercise schema-compatible risk enrichment and scoring
        run: |
          jq '.assets |= map(. + {
            secrecy_lifetime_years: 10,
            data_classification: "internal",
            impact: "operational",
            migration_deadline_months: 12,
            remediation_effort: "medium"
          })' build/evidence/iac-inventory.json > build/evidence/risk-input.json
          check-jsonschema \
            --schemafile schemas/crypto-inventory.schema.json \
            build/evidence/risk-input.json
          opa eval --format raw \
            --data policies \
            --input build/evidence/risk-input.json \
            'data.quantumforge.scoring.assessment' \
            > build/evidence/risk-assessment.json
          jq -e '
            .valid_asset_count == 2 and
            .invalid_asset_count == 0 and
            (.scored_inventory | length) == 2
          ' build/evidence/risk-assessment.json >/dev/null

      - name: Run Checkov
        run: |
          mkdir -p build/checkov
          docker run --rm \
            -v "$PWD:/repo:ro" \
            -v "$PWD/build/checkov:/output" \
            "$CHECKOV_IMAGE" \
            --directory /repo \
            --framework terraform github_actions \
            --compact \
            --quiet \
            --output json \
            --output-file-path /output
          cp build/checkov/results_json.json build/evidence/checkov-report.json
          jq -e '
            if type == "array" then
              all(.[]; .summary.failed == 0 and .summary.parsing_errors == 0)
            else
              .summary.failed == 0 and .summary.parsing_errors == 0
            end
          ' build/evidence/checkov-report.json >/dev/null

      - name: Run Trivy IaC scan
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -v "$PWD/build/evidence:/output" \
            aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa \
            config \
            --skip-version-check \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format json \
            --output /output/trivy-report.json \
            /work
          jq -e '
            ([.Results[]?] | length) > 0 and
            ([.Results[]?.Misconfigurations[]? | select(.Status == "FAIL")] | length) == 0
          ' build/evidence/trivy-report.json >/dev/null

      - name: Run Trivy secret scan
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -v "$PWD/build/evidence:/output" \
            aquasec/trivy@sha256:3d1f862cb6c4fe13c1506f96f816096030d8d5ccdb2380a3069f7bf07daa86aa \
            fs \
            --skip-version-check \
            --scanners secret \
            --exit-code 1 \
            --format json \
            --output /output/trivy-secret-report.json \
            /work
          jq -e '([.Results[]?.Secrets[]?] | length) == 0' \
            build/evidence/trivy-secret-report.json >/dev/null

      - name: Generate CBOM
        run: |
          ./scripts/generate-cbom.py build/evidence/cbom.json
          jq -e '.bomFormat == "CycloneDX" and .specVersion == "1.5" and (.components | length >= 10)' \
            build/evidence/cbom.json >/dev/null

      - name: Build complete evidence bundle
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: ./scripts/build-evidence.py build/evidence build/quantumforge-synthetic-test-evidence.zip

      - name: Reject incomplete or failed evidence bundles
        run: |
          cp -R build/evidence build/incomplete-evidence
          rm build/incomplete-evidence/cbom.json
          if ./scripts/build-evidence.py build/incomplete-evidence build/invalid-missing.zip; then
            echo "Evidence builder accepted a missing CBOM" >&2
            exit 1
          fi
          cp build/evidence/cbom.json build/incomplete-evidence/cbom.json
          jq '.status = "collection_failed"' build/evidence/assessment-status.json \
            > build/incomplete-evidence/assessment-status.json
          if ./scripts/build-evidence.py build/incomplete-evidence build/invalid-status.zip; then
            echo "Evidence builder accepted a failed assessment" >&2
            exit 1
          fi
          cp -R build/evidence build/mismatched-evidence
          jq '.total_assets += 1' build/mismatched-evidence/census-summary.json \
            > build/mismatched-evidence/census-summary.json.tmp
          mv build/mismatched-evidence/census-summary.json.tmp \
            build/mismatched-evidence/census-summary.json
          if ./scripts/build-evidence.py build/mismatched-evidence build/invalid-counts.zip; then
            echo "Evidence builder accepted mismatched inventory counts" >&2
            exit 1
          fi
          cp -R build/evidence build/mismatched-risk-evidence
          jq '.assets[0].asset_id = "different.synthetic.asset"' \
            build/mismatched-risk-evidence/risk-input.json \
            > build/mismatched-risk-evidence/risk-input.json.tmp
          mv build/mismatched-risk-evidence/risk-input.json.tmp \
            build/mismatched-risk-evidence/risk-input.json
          if ./scripts/build-evidence.py build/mismatched-risk-evidence build/invalid-risk.zip; then
            echo "Evidence builder accepted mismatched risk asset IDs" >&2
            exit 1
          fi
          cp -R build/evidence build/private-environment-evidence
          jq '.assessment_scope = "environment"' \
            build/private-environment-evidence/assessment-status.json \
            > build/private-environment-evidence/assessment-status.json.tmp
          mv build/private-environment-evidence/assessment-status.json.tmp \
            build/private-environment-evidence/assessment-status.json
          jq '._privacy_test = "arn:aws:kms:us-east-1:123456789012:key/example"' \
            build/private-environment-evidence/plan.json \
            > build/private-environment-evidence/plan.json.tmp
          mv build/private-environment-evidence/plan.json.tmp \
            build/private-environment-evidence/plan.json
          if ./scripts/build-evidence.py build/private-environment-evidence build/invalid-private.zip; then
            echo "Evidence builder accepted a private environment identifier" >&2
            exit 1
          fi

      - name: Upload short-lived CI evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quantumforge-synthetic-test-evidence
          path: |
            build/quantumforge-synthetic-test-evidence.zip
            build/quantumforge-synthetic-test-evidence.zip.sha256
          if-no-files-found: error
          retention-days: 30

  attest-offline-evidence:
    name: Attest trusted main-branch evidence
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: offline-validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Download validated evidence
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: quantumforge-synthetic-test-evidence
          path: build

      - name: Verify evidence checksum
        run: |
          cd build
          sha256sum -c quantumforge-synthetic-test-evidence.zip.sha256

      - name: Attest complete evidence bundle
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: build/quantumforge-synthetic-test-evidence.zip

  publish-offline-evidence:
    name: Publish trusted evidence to immutable storage
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.QUANTUMFORGE_EVIDENCE_BUCKET != '' }}
    needs: [offline-validation, attest-offline-evidence]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: quantumforge-aws-sandbox
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out publisher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download validated evidence
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: quantumforge-synthetic-test-evidence
          path: build

      - name: Verify evidence checksum
        run: |
          cd build
          sha256sum -c quantumforge-synthetic-test-evidence.zip.sha256

      - name: Configure scoped AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ vars.QUANTUMFORGE_AWS_ROLE_ARN }}
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Verify sandbox identity
        env:
          EXPECTED_ACCOUNT: ${{ vars.QUANTUMFORGE_AWS_ACCOUNT_ID }}
        run: |
          test -n "$EXPECTED_ACCOUNT"
          test "$(aws sts get-caller-identity --query Account --output text)" = "$EXPECTED_ACCOUNT"

      - name: Publish immutable evidence version
        env:
          AWS_REGION: us-east-1
        run: |
          ./scripts/publish-evidence-s3.sh \
            build/quantumforge-synthetic-test-evidence.zip \
            "${{ vars.QUANTUMFORGE_EVIDENCE_BUCKET }}"
