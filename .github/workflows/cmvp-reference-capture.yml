name: Capture NIST cryptographic-module validation reference

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate-reference:
    name: Validate and archive the NIST Modules in Process reference
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate the local watchlist
        run: |
          jq -e 'type == "object" or type == "array"' watchlist/cmvp-watchlist.json >/dev/null

      - name: Fetch the CMVP Modules in Process reference
        run: |
          mkdir -p reports
          curl --fail --silent --show-error --location \
            "https://csrc.nist.gov/CSRC/media/Projects/cryptographic-module-validation-program/documents/modinprocess/MIP%20List.pdf" \
            --output reports/mip-list.pdf
          test "$(head -c 4 reports/mip-list.pdf)" = "%PDF"
          sha256sum reports/mip-list.pdf > reports/mip-list.pdf.sha256

      - name: Upload reference evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nist-cmvp-reference-document
          path: reports/
          if-no-files-found: error
          retention-days: 30
